spring.application.name=plus-ms-categorias

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/categorias}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

server.port=3004

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

security.jwt.secret=${JWT_SECRET:dev-secret}
